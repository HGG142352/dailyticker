<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOSPI Top 30 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0f1e;
      --surface: rgba(255,255,255,0.05);
      --border:  rgba(255,255,255,0.10);
      --accent:  #4f8ef7;
      --accent2: #7c3aed;
      --green:   #22c55e;
      --red:     #ef4444;
      --yellow:  #f59e0b;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --radius:  12px;
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{
      font-family:'Inter',sans-serif;
      background:var(--bg); color:var(--text); min-height:100vh;
      background-image:
        radial-gradient(ellipse at 20% 20%,rgba(79,142,247,.15) 0%,transparent 50%),
        radial-gradient(ellipse at 80% 80%,rgba(124,58,237,.12) 0%,transparent 50%);
    }

    /* ── Header ─────────────────────────────────────── */
    header{
      display:flex; align-items:center; justify-content:space-between;
      padding:28px 40px 20px;
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(8px);
      position:sticky; top:0; z-index:10;
      background:rgba(10,15,30,.7);
    }
    .logo{ display:flex; align-items:center; gap:12px; }
    .logo-icon{ width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px; }
    .logo-text{ font-size:18px;font-weight:700;letter-spacing:-.3px; }
    .logo-sub{ font-size:11px;color:var(--muted);margin-top:1px; }
    .header-right{ display:flex;align-items:center;gap:16px; }
    #status-dot{ width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s; }
    #status-dot.running{ background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 1s infinite; }
    #status-dot.done{    background:var(--green); box-shadow:0 0 8px var(--green); }
    #status-dot.error{   background:var(--red);   box-shadow:0 0 8px var(--red); }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    #status-text{ font-size:13px;color:var(--muted); }
    #run-btn{
      display:flex;align-items:center;gap:8px;
      padding:10px 22px; border:none; border-radius:8px; cursor:pointer;
      font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
      background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;
      transition:opacity .2s,transform .15s,box-shadow .2s;
      box-shadow:0 4px 20px rgba(79,142,247,.35);
    }
    #run-btn:hover:not(:disabled){ opacity:.9;transform:translateY(-1px);box-shadow:0 6px 24px rgba(79,142,247,.5); }
    #run-btn:disabled{ opacity:.5;cursor:not-allowed; }
    .spinner{ width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none; }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Main ───────────────────────────────────────── */
    main{ padding:32px 40px; }
    #stats-bar{ display:flex;gap:16px;flex-wrap:wrap;margin-bottom:28px;opacity:0;transition:opacity .4s; }
    #stats-bar.visible{ opacity:1; }
    .stat-card{ flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;backdrop-filter:blur(8px); }
    .stat-label{ font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px; }
    .stat-value{ font-size:22px;font-weight:700;margin-top:4px; }
    #toolbar{ display:none;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap; }
    #toolbar.visible{ display:flex; }
    #search{ flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s; }
    #search:focus{ border-color:var(--accent); }
    #search::placeholder{ color:var(--muted); }
    .toolbar-info{ font-size:12px;color:var(--muted);white-space:nowrap; }
    #table-wrap{ background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;backdrop-filter:blur(8px);opacity:0;transform:translateY(12px);transition:opacity .4s,transform .4s; }
    #table-wrap.visible{ opacity:1;transform:translateY(0); }
    table{ width:100%;border-collapse:collapse;font-size:13px; }
    thead{ background:rgba(255,255,255,.06); }
    th{ padding:13px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap; }
    th.num{ text-align:right; }
    tbody tr{ border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s; }
    tbody tr:last-child{ border-bottom:none; }
    tbody tr:hover{ background:rgba(79,142,247,.07); }
    tbody tr.group-odd{ background:rgba(255,255,255,.02); }
    tbody tr.group-odd:hover{ background:rgba(79,142,247,.07); }
    td{ padding:11px 16px;vertical-align:middle; }
    td.num{ text-align:right;font-variant-numeric:tabular-nums; }

    /* ── 종목명 배지 (클릭 가능) ────────────────────── */
    .name-badge{
      display:inline-block; padding:3px 10px; border-radius:20px;
      font-size:12px; font-weight:600;
      background:rgba(79,142,247,.15); color:var(--accent);
      cursor:pointer; transition:background .2s,color .2s,transform .15s;
      border:1px solid transparent;
    }
    .name-badge:hover{ background:rgba(79,142,247,.3);border-color:var(--accent);transform:scale(1.04); }
    .ticker-cell{ font-family:monospace;color:var(--muted);font-size:12px; }

    #log-box{ display:none;margin-top:20px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;font-family:monospace;font-size:12px;color:#94a3b8;white-space:pre-wrap;max-height:200px;overflow-y:auto; }
    #error-box{ display:none;margin-top:20px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius);padding:16px 20px;color:#fca5a5;font-size:13px; }
    #empty{ text-align:center;padding:80px 20px;color:var(--muted); }
    #empty .empty-icon{ font-size:48px;margin-bottom:16px; }
    #empty h3{ font-size:18px;font-weight:600;color:var(--text);margin-bottom:8px; }
    #empty p{ font-size:13px; }

    /* ── 퀀트 슬라이드 패널 ─────────────────────────── */
    #panel-overlay{
      position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,.5);
      opacity:0; pointer-events:none;
      transition:opacity .3s;
      backdrop-filter:blur(4px);
    }
    #panel-overlay.open{ opacity:1; pointer-events:all; }

    #quant-panel{
      position:fixed; top:0; right:0; bottom:0;
      width:min(560px, 100vw);
      background:#111827;
      border-left:1px solid var(--border);
      transform:translateX(100%);
      transition:transform .35s cubic-bezier(.4,0,.2,1);
      z-index:101;
      display:flex; flex-direction:column;
      overflow:hidden;
    }
    #quant-panel.open{ transform:translateX(0); }

    #panel-header{
      display:flex; align-items:center; justify-content:space-between;
      padding:24px 28px 20px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    #panel-title{ font-size:18px; font-weight:700; }
    #panel-subtitle{ font-size:12px; color:var(--muted); margin-top:2px; }
    #panel-close{
      width:32px; height:32px; border-radius:8px;
      border:1px solid var(--border); background:transparent;
      color:var(--muted); cursor:pointer; font-size:18px;
      display:flex; align-items:center; justify-content:center;
      transition:background .2s, color .2s;
    }
    #panel-close:hover{ background:rgba(255,255,255,.08); color:var(--text); }

    #panel-body{ flex:1; overflow-y:auto; padding:24px 28px; }
    #panel-body::-webkit-scrollbar{ width:4px; }
    #panel-body::-webkit-scrollbar-track{ background:transparent; }
    #panel-body::-webkit-scrollbar-thumb{ background:var(--border); border-radius:2px; }

    /* 패널 내 섹션 */
    .p-section{ margin-bottom:24px; }
    .p-section-title{
      font-size:11px; font-weight:600; color:var(--muted);
      text-transform:uppercase; letter-spacing:.6px;
      margin-bottom:12px;
      display:flex; align-items:center; gap:8px;
    }
    .p-section-title::after{ content:''; flex:1; height:1px; background:var(--border); }

    .kpi-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
    .kpi-card{
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:10px; padding:12px 14px;
    }
    .kpi-label{ font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
    .kpi-value{ font-size:16px; font-weight:700; margin-top:4px; }
    .kpi-value.pos{ color:var(--green); }
    .kpi-value.neg{ color:var(--red); }
    .kpi-value.neu{ color:var(--accent); }

    .trend-table{ width:100%; border-collapse:collapse; font-size:12px; }
    .trend-table th{ padding:8px 10px; color:var(--muted); font-size:10px; text-align:right; border-bottom:1px solid var(--border); }
    .trend-table th:first-child{ text-align:left; }
    .trend-table td{ padding:8px 10px; text-align:right; border-bottom:1px solid rgba(255,255,255,.04); font-variant-numeric:tabular-nums; }
    .trend-table td:first-child{ text-align:left; color:var(--muted); }

    .event-list{ display:flex; flex-direction:column; gap:8px; }
    .event-item{
      background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:8px; padding:10px 12px;
      display:flex; align-items:flex-start; gap:10px;
    }
    .event-kw{
      flex-shrink:0; padding:2px 8px; border-radius:20px;
      font-size:10px; font-weight:700;
      background:rgba(245,158,11,.15); color:var(--yellow);
    }
    .event-date{ font-size:10px; color:var(--muted); margin-top:3px; }
    .event-title{ font-size:12px; font-weight:500; }

    .info-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .info-row{ font-size:12px; }
    .info-row span:first-child{ color:var(--muted); margin-right:6px; }

    .no-data{ text-align:center; padding:32px; color:var(--muted); font-size:13px; }

    @media(max-width:700px){
      header{ padding:18px 20px; }
      main{ padding:20px; }
      #quant-panel{ width:100vw; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">📈</div>
    <div>
      <div class="logo-text">KOSPI Top 30</div>
      <div class="logo-sub">시가총액 기준 실시간 대시보드</div>
    </div>
  </div>
  <div class="header-right">
    <span id="update-notice" style="font-size: 13px; color: var(--muted); margin-right: 15px;">※ 매일 아침 7시 / 저녁 8시 자동 갱신됨</span>
    <button id="refresh-btn" onclick="manualRefresh()" style="display:flex;align-items:center;gap:8px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;background:var(--surface);color:var(--text);transition:background .2s;">🔄 새로고침</button>
  </div>
</header>

<main>
  <!-- Stats -->
  <div id="stats-bar">
    <div class="stat-card"><div class="stat-label">종목 수</div><div class="stat-value" id="s-tickers">–</div></div>
    <div class="stat-card"><div class="stat-label">레코드 수</div><div class="stat-value" id="s-records">–</div></div>
    <div class="stat-card"><div class="stat-label">기준 날짜</div><div class="stat-value" id="s-latest" style="font-size:16px">–</div></div>
    <div class="stat-card"><div class="stat-label">조회 시각</div><div class="stat-value" id="s-time" style="font-size:16px">–</div></div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <input id="search" type="text" placeholder="🔍 종목명 또는 티커 검색..." oninput="filterTable()" />
    <span class="toolbar-info" id="row-count"></span>
  </div>

  <!-- Table -->
  <div id="table-wrap">
    <div id="empty">
      <div class="empty-icon">💹</div>
      <h3>데이터가 없습니다</h3>
      <p><strong>실행하기</strong> 버튼을 눌러 데이터를 조회하세요.<br>
         종목명을 클릭하면 DART 퀀트 정보를 볼 수 있습니다.</p>
    </div>
    <table id="data-table" style="display:none">
      <thead>
        <tr>
          <th>#</th><th>날짜</th><th>티커</th><th>종목명</th>
          <th class="num">시가 (₩)</th><th class="num">고가 (₩)</th>
          <th class="num">저가 (₩)</th><th class="num">종가 (₩)</th>
          <th class="num">거래량</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div id="log-box"></div>
  <div id="error-box"></div>
</main>

<!-- 퀀트 슬라이드 패널 -->
<div id="panel-overlay" onclick="closePanel()"></div>
<div id="quant-panel">
  <div id="panel-header">
    <div>
      <div id="panel-title">–</div>
      <div id="panel-subtitle">종목 퀀트 분석</div>
    </div>
    <button id="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div id="panel-body">
    <div class="no-data">종목을 선택하세요</div>
  </div>
</div>

<script>
  let allRows   = [];
  let quantData = {};   // ticker → quant dict

  // ── GitHub Raw 기본 URL ──────────────────────────────
  const RAW_BASE = 'https://raw.githubusercontent.com/HGG142352/dailyticker/main';

  // ── 퀀트 데이터 로드 (GitHub Raw) ───────────────────
  async function loadQuantData() {
    try {
      const res = await fetch(`${RAW_BASE}/dart_quant_top30.json?t=${Date.now()}`);
      if (res.ok) {
        const j = await res.json();
        const obj = {};
        (j.data || []).forEach(item => {
           obj[item.기업_식별_정보.종목코드] = item;
        });
        quantData = obj;
      }
    } catch(e){ console.error('퀀트 데이터 파싱 오류:', e); }
  }

  // ── 마켓 데이터 로드 (GitHub Raw) ───────────────────
  async function loadMarketData() {
    try {
      const res = await fetch(`${RAW_BASE}/top30_market_data.json?t=${Date.now()}`);
      if (res.ok) {
        const data = await res.json();
        allRows = data;
        renderTable(allRows);
        const notice = document.getElementById('update-notice');
        if(notice) notice.textContent = `※ 마지막 조회: ${new Date().toLocaleTimeString('ko-KR')} | 매일 07:00·20:00 자동 갱신`;
      } else {
        throw new Error("GitHub Raw 데이터 파일을 찾을 수 없습니다.");
      }
    } catch(e){ 
      document.getElementById('error-box').innerHTML=`<strong>오류:</strong> ${e.message}`;
      document.getElementById('error-box').style.display='block';
    }
  }

  // ── 수동 새로고침 ────────────────────────────────────
  async function manualRefresh() {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;
    btn.textContent = '⏳ 로딩 중...';
    await loadQuantData();
    await loadMarketData();
    btn.disabled = false;
    btn.innerHTML = '🔄 새로고침';
  }

  // ── 초기화 ───────────────────────────────────────────
  async function init() {
    await loadQuantData();
    await loadMarketData();
    // 30분마다 자동 갱신
    setInterval(() => {
      loadQuantData().then(() => loadMarketData());
    }, 30 * 60 * 1000);
  }
  init();

  // ── 테이블 렌더 ─────────────────────────────────────────
  function fmt(n){ return Number(n).toLocaleString('ko-KR'); }

  function renderTable(rows) {
    const tbody= document.getElementById('tbody');
    const table= document.getElementById('data-table');
    const empty= document.getElementById('empty');
    const wrap = document.getElementById('table-wrap');
    const tb   = document.getElementById('toolbar');
    const sb   = document.getElementById('stats-bar');
    tbody.innerHTML='';
    if(!rows||!rows.length){ table.style.display='none'; empty.style.display='block'; return; }

    const tickerOrder=[];
    rows.forEach(r=>{ if(!tickerOrder.includes(r.ticker)) tickerOrder.push(r.ticker); });

    rows.forEach((r,i)=>{
      const gi = tickerOrder.indexOf(r.ticker);
      const tr = document.createElement('tr');
      tr.className= gi%2===0 ? '' : 'group-odd';
      tr.dataset.name=r.name; tr.dataset.ticker=r.ticker;
      const hasQuant = !!quantData[r.ticker];
      const badgeTitle = hasQuant ? '클릭하여 DART 퀀트 정보 보기' : '퀀트 데이터 없음';
      tr.innerHTML=`
        <td>${i+1}</td>
        <td>${r.date}</td>
        <td><span class="ticker-cell">${r.ticker}</span></td>
        <td>
          <span class="name-badge" title="${badgeTitle}"
                onclick="openPanel('${r.ticker}','${r.name}')"
                style="${hasQuant?'':'opacity:.5;cursor:default'}">
            ${r.name}
          </span>
        </td>
        <td class="num">${fmt(r.open)}</td>
        <td class="num">${fmt(r.high)}</td>
        <td class="num">${fmt(r.low)}</td>
        <td class="num">${fmt(r.close)}</td>
        <td class="num">${fmt(r.volume)}</td>`;
      tbody.appendChild(tr);
    });

    empty.style.display='none'; table.style.display='table';
    wrap.classList.add('visible'); tb.classList.add('visible'); sb.classList.add('visible');
    const tickers=[...new Set(rows.map(r=>r.ticker))];
    const dates  =[...new Set(rows.map(r=>r.date))].sort();
    document.getElementById('s-tickers').textContent=tickers.length;
    document.getElementById('s-records').textContent=rows.length;
    document.getElementById('s-latest').textContent =dates.at(-1)||'–';
    document.getElementById('s-time').textContent   =new Date().toLocaleTimeString('ko-KR');
    updateRowCount();
  }

  function filterTable(){
    const q=document.getElementById('search').value.trim().toLowerCase();
    document.querySelectorAll('#tbody tr').forEach(tr=>{
      const m=tr.dataset.name.includes(q)||tr.dataset.ticker.includes(q);
      tr.style.display=(!q||m)?'':'none';
    });
    updateRowCount();
  }
  function updateRowCount(){
    const v=document.querySelectorAll('#tbody tr:not([style*="display: none"])').length;
    document.getElementById('row-count').textContent=`${v}개 행 표시 중`;
  }

  // ── 퀀트 패널 ───────────────────────────────────────────
  function openPanel(ticker, name) {
    const qd = quantData[ticker];
    if(!qd){ return; }

    document.getElementById('panel-title').textContent   = name;
    document.getElementById('panel-subtitle').textContent= `${ticker} · DART 퀀트 분석`;
    renderPanel(qd);
    document.getElementById('panel-overlay').classList.add('open');
    document.getElementById('quant-panel').classList.add('open');
    document.body.style.overflow='hidden';
  }

  function closePanel(){
    document.getElementById('panel-overlay').classList.remove('open');
    document.getElementById('quant-panel').classList.remove('open');
    document.body.style.overflow='';
  }
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePanel(); });

  function colorKpi(val, good='pos'){
    if(val===null||val===undefined||val==='N/A') return 'neu';
    const s=String(val);
    if(s.startsWith('+')) return good==='pos'?'pos':'neg';
    if(s.startsWith('-')) return good==='pos'?'neg':'pos';
    return 'neu';
  }

  function renderPanel(d){
    const body= document.getElementById('panel-body');
    const info = d['기업_식별_정보']||{};
    const kpi  = d['퀀트_핵심_지표']||{};
    const qual = kpi['수익성_Quality']||{};
    const val  = kpi['밸류에이션']||{};
    const safe = kpi['안정성_Safety']||{};
    const grow = kpi['성장성_Growth']||{};
    const trend= d['재무제표_3개년_추이']||{};
    const evts = d['최근_주요_이벤트']||[];
    const years= trend['연도']||[];

    const fmtKRW = v => v && Number(v) ? (Number(v)/1e8).toLocaleString('ko-KR',{maximumFractionDigits:0})+'억' : 'N/A';

    // 공시 이벤트 HTML
    const evtHtml = evts.length
      ? evts.map(e=>`
        <div class="event-item">
          <div>
            <span class="event-kw">${e['키워드']||'공시'}</span>
            <div class="event-title">${e['공시명']}</div>
            <div class="event-date">${e['날짜']||''}</div>
          </div>
        </div>`).join('')
      : '<div class="no-data" style="padding:12px">최근 주요 공시 없음</div>';

    // 3개년 추이 rows
    const trendRows = [['매출액','매출액'],['영업이익','영업이익'],['영업활동현금흐름','영업CF']].map(([k,lbl])=>{
      const cols = years.map(yr=>`<td>${fmtKRW(trend[k]?.[yr])}</td>`).join('');
      return `<tr><td>${lbl}</td>${cols}</tr>`;
    }).join('');

    body.innerHTML=`
      <!-- 기업 식별 정보 -->
      <div class="p-section">
        <div class="p-section-title">기업 정보</div>
        <div class="info-grid">
          <div class="info-row"><span>업종</span>${info['업종명']||'–'}</div>
          <div class="info-row"><span>대표자</span>${info['대표자']||'–'}</div>
          <div class="info-row"><span>corp_code</span>${info['corp_code']||'–'}</div>
          <div class="info-row"><span>기준연도</span>${info['기준연도']||'–'}</div>
        </div>
      </div>

      <!-- 수익성 -->
      <div class="p-section">
        <div class="p-section-title">수익성 Quality</div>
        <div class="kpi-grid">
          <div class="kpi-card"><div class="kpi-label">ROE</div><div class="kpi-value neu">${qual['ROE']||'N/A'}</div></div>
          <div class="kpi-card"><div class="kpi-label">ROA</div><div class="kpi-value neu">${qual['ROA']||'N/A'}</div></div>
          <div class="kpi-card"><div class="kpi-label">영업이익률</div><div class="kpi-value neu">${qual['영업이익률']||'N/A'}</div></div>
          <div class="kpi-card"><div class="kpi-label">GP/A</div><div class="kpi-value neu">${qual['GP_A']||'N/A'}</div></div>
        </div>
      </div>

      <!-- 밸류에이션 -->
      <div class="p-section">
        <div class="p-section-title">밸류에이션</div>
        <div class="kpi-grid">
          <div class="kpi-card"><div class="kpi-label">PER</div><div class="kpi-value neu">${val['PER']||'N/A'}</div></div>
          <div class="kpi-card"><div class="kpi-label">PBR</div><div class="kpi-value neu">${val['PBR']||'N/A'}</div></div>
          <div class="kpi-card"><div class="kpi-label">현재주가</div><div class="kpi-value neu">${val['현재주가']?Number(val['현재주가']).toLocaleString('ko-KR')+'원':'N/A'}</div></div>
          <div class="kpi-card"><div class="kpi-label">EPS</div><div class="kpi-value neu">${val['EPS']?Number(val['EPS']).toLocaleString('ko-KR')+'원':'N/A'}</div></div>
          <div class="kpi-card"><div class="kpi-label">BPS</div><div class="kpi-value neu">${val['BPS']?Number(val['BPS']).toLocaleString('ko-KR')+'원':'N/A'}</div></div>
          <div class="kpi-card"><div class="kpi-label">발행주식수</div><div class="kpi-value neu" style="font-size:13px">${val['발행주식수']?Number(val['발행주식수']).toLocaleString('ko-KR'):'N/A'}</div></div>
        </div>
      </div>

      <!-- 안정성 -->
      <div class="p-section">
        <div class="p-section-title">안정성 Safety</div>
        <div class="kpi-grid">
          <div class="kpi-card"><div class="kpi-label">부채비율</div><div class="kpi-value neu">${safe['부채비율']||'N/A'}</div></div>
          <div class="kpi-card"><div class="kpi-label">유동비율</div><div class="kpi-value neu">${safe['유동비율']||'N/A'}</div></div>
          <div class="kpi-card"><div class="kpi-label">순현금</div>
            <div class="kpi-value ${safe['순현금']==='Positive'?'pos':'neg'}">${safe['순현금']||'N/A'}</div>
          </div>
        </div>
      </div>

      <!-- 성장성 -->
      <div class="p-section">
        <div class="p-section-title">성장성 Growth (전년비)</div>
        <div class="kpi-grid">
          <div class="kpi-card"><div class="kpi-label">매출성장률</div>
            <div class="kpi-value ${colorKpi(grow['매출성장률_전년비'])}">${grow['매출성장률_전년비']||'N/A'}</div>
          </div>
          <div class="kpi-card"><div class="kpi-label">영업이익 성장</div>
            <div class="kpi-value ${colorKpi(grow['영업이익성장률_전년비'])}">${grow['영업이익성장률_전년비']||'N/A'}</div>
          </div>
          <div class="kpi-card"><div class="kpi-label">순이익 성장</div>
            <div class="kpi-value ${colorKpi(grow['순이익성장률_전년비'])}">${grow['순이익성장률_전년비']||'N/A'}</div>
          </div>
        </div>
      </div>

      <!-- 3개년 추이 -->
      <div class="p-section">
        <div class="p-section-title">재무 3개년 추이 (억원)</div>
        <table class="trend-table">
          <thead><tr><th>항목</th>${years.map(y=>`<th>${y}</th>`).join('')}</tr></thead>
          <tbody>${trendRows}</tbody>
        </table>
      </div>

      <!-- 주요 공시 -->
      <div class="p-section">
        <div class="p-section-title">최근 주요 공시</div>
        <div class="event-list">${evtHtml}</div>
      </div>
    `;
  }
</script>
</body>
</html>
